name: End to end test
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
  push:
    branches:
      - main
      - master

jobs:
  create-cluster:
    permissions:
      contents: read
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Create k8s kind cluster
        uses: helm/kind-action@v1
        with:
          config: ./kind-config.yaml
          wait: 3m
      - name: Setup ingress controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=90s
      - name: Setup kubeseal controller
        run: |
          helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
          helm install sealed-secrets -n kube-system \
            --set-string fullnameOverride=sealed-secrets-controller \
            --wait --timeout=180s \
            sealed-secrets/sealed-secrets
          kubectl wait --namespace kube-system \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/name=sealed-secrets \
            --timeout=120s
      - name: Build and upload images
        run: |
          docker build -t ghcr.io/jaydee94/kubeseal-webgui/api:snapshot -f Dockerfile.api .
          docker build -t ghcr.io/jaydee94/kubeseal-webgui/ui:snapshot -f Dockerfile.ui .
          kind load docker-image --name chart-testing ghcr.io/jaydee94/kubeseal-webgui/api:snapshot
          kind load docker-image --name chart-testing ghcr.io/jaydee94/kubeseal-webgui/ui:snapshot
      - name: Deploy stuff
        run: |
          kubectl create namespace kubeseal-webgui
          helm template \
            --release-name e2e-test \
            --namespace kubeseal-webgui \
            --set api.image.tag=snapshot \
            --set api.url=http://$(hostname -f):80 \
            --set autoFetchCertResources=null \
            --set image.pullPolicy=Never \
            --set ingress.enabled=true \
            --set ingress.hostname=$(hostname -f) \
            --set resources=null \
            --set sealedSecrets.autoFetchCert=true \
            --set ui.image.tag=snapshot \
            --set securityContext.runAsUser=1042 \
            chart/kubeseal-webgui \
          | kubectl apply \
            -f - \
            --namespace kubeseal-webgui
      - name: Wait for deployment to be available
        run: |
          kubectl rollout status --namespace kubeseal-webgui \
            deployment/e2e-test-kubeseal-webgui --timeout=240s
        timeout-minutes: 5
      - name: Wait until ready
        run: |
          HOST=$(hostname -f)
          echo "Probing ingress at http://${HOST}:80/namespaces"
          attempt=0
          last_code=""
          while true; do
            attempt=$((attempt + 1))
            response=$(curl -s -o /tmp/curl_body -w '%{http_code}' "http://${HOST}:80/namespaces" || echo "curl_failed")
            if [ "$response" = "200" ]; then
              echo "Ready after ${attempt} attempts"
              break
            fi
            if [ "$response" != "$last_code" ]; then
              echo "Attempt ${attempt}: HTTP ${response}"
              echo "--- body ---"
              cat /tmp/curl_body || true
              echo "--- /body ---"
              last_code=$response
            fi
            sleep 5
          done
        timeout-minutes: 2
      - name: Debug on failure
        if: failure()
        run: |
          set +e
          HOST=$(hostname -f)
          OUT=e2e-debug.log
          {
            echo "=== resolved host: ${HOST} ==="
            echo "=== pods (kubeseal-webgui) ==="
            kubectl get pods --namespace kubeseal-webgui -o wide
            echo "=== describe deployment ==="
            kubectl describe deployment --namespace kubeseal-webgui e2e-test-kubeseal-webgui
            echo "=== describe pods ==="
            kubectl describe pods --namespace kubeseal-webgui -l app=kubeseal-webgui
            echo "=== api logs (current) ==="
            kubectl logs --namespace kubeseal-webgui -l app=kubeseal-webgui -c api --tail=300
            echo "=== api logs (previous) ==="
            kubectl logs --namespace kubeseal-webgui -l app=kubeseal-webgui -c api --tail=300 -p
            echo "=== ui logs (current) ==="
            kubectl logs --namespace kubeseal-webgui -l app=kubeseal-webgui -c ui --tail=300
            echo "=== events (kubeseal-webgui ns) ==="
            kubectl get events --namespace kubeseal-webgui --sort-by=.lastTimestamp
            echo "=== ingress ==="
            kubectl get ingress --namespace kubeseal-webgui -o yaml
            echo "=== services ==="
            kubectl get svc --namespace kubeseal-webgui
            echo "=== ingress-nginx pods ==="
            kubectl get pods --namespace ingress-nginx -o wide
            echo "=== ingress-nginx controller logs ==="
            kubectl logs --namespace ingress-nginx -l app.kubernetes.io/component=controller --tail=200
            echo "=== sealed-secrets pods ==="
            kubectl get pods --namespace kube-system -l app.kubernetes.io/name=sealed-secrets -o wide
            echo "=== direct curl to ingress ==="
            curl -v "http://${HOST}:80/namespaces"
          } 2>&1 | tee "$OUT"
          {
            echo '<details><summary>e2e debug output</summary>'
            echo ''
            echo '```'
            cat "$OUT"
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload e2e debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug-log
          path: e2e-debug.log
          if-no-files-found: ignore
      - name: Post debug log as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              const log = fs.readFileSync('e2e-debug.log', 'utf8');
              // GitHub comments cap at 65536 chars; keep ample headroom
              const max = 60000;
              const trimmed = log.length > max ? log.slice(-max) : log;
              body = '### e2e create-cluster debug output (commit `'
                + context.sha.substring(0, 7) + '`)\n\n```\n'
                + trimmed + '\n```';
            } catch (e) {
              body = '### e2e create-cluster debug output\n\n_no debug file produced: ' + e.message + '_';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Call URL
        run: |
          curl -f http://$(hostname -f):80/namespaces
          curl -f http://$(hostname -f):80/config
          echo '{"secret": "a","namespace": "kube-system","scope": "strict","secrets": [{"key": "a","value": "YQ=="},{"key": "b","value": "Yw=="}]}' \
          | curl -f -H 'content-type: application/json' -X POST --data @- http://$(hostname -f):80/secrets
      - name: Test Secrets
        run: |
          API_URL="https://$(hostname -f):443"
          kubectl create namespace e2e
          strict_secret=$(
            echo '{"secret": "strict-secret", "namespace": "e2e", "scope": "strict", "secrets": [{"key": "a-secret","value": "YQ=="}]}' |
              curl -f -H 'content-type: application/json' -X POST -k --data @- "${API_URL}/secrets" |
              jq -r -s '.[0][] | select(.key=="a-secret") | "a-secret: " + .value')
          namespace_secret=$(
            echo '{"namespace": "e2e", "scope": "namespace-wide", "secrets": [{"key": "a-secret","value": "YQ=="}]}' |
              curl -f -H 'content-type: application/json' -X POST -k --data @- "${API_URL}/secrets" |
              jq -r -s '.[0][] | select(.key=="a-secret") | "a-secret: " + .value')
          cluster_secret=$(
            echo '{"scope": "cluster-wide", "secrets": [{"key": "different-secret","value": "YQ=="}]}' |
              curl -f -H 'content-type: application/json' -X POST -k --data @- "${API_URL}/secrets" |
              jq -r -s '.[0][] | select(.key=="different-secret") | "a-secret: " + .value')

          cat <<EOF | kubectl apply -n e2e -f -
          apiVersion: bitnami.com/v1alpha1
          kind: SealedSecret
          metadata:
            name: strict-secret
            namespace: e2e
            annotations: {  }
          spec:
            encryptedData:
              ${strict_secret}
          EOF


          cat <<EOF | kubectl apply -n e2e -f -
          apiVersion: bitnami.com/v1alpha1
          kind: SealedSecret
          metadata:
            name: namespace-secret
            namespace: e2e
            annotations: { sealedsecrets.bitnami.com/namespace-wide: "true" }
          spec:
            encryptedData:
              ${namespace_secret}
          EOF

          cat <<EOF | kubectl apply -n e2e -f -
          apiVersion: bitnami.com/v1alpha1
          kind: SealedSecret
          metadata:
            name: cluster-secret
            namespace: e2e
            annotations: { sealedsecrets.bitnami.com/cluster-wide: "true" }
          spec:
            encryptedData:
              ${cluster_secret}
          EOF

          sleep 5

          for secret_name in strict-secret namespace-secret cluster-secret; do
            echo -n "Testing ${secret_name} "
            test "$(kubectl get secret "${secret_name}" -n e2e \
            -o go-template --template '{{ index .data "a-secret" }}')" = "YQ==" ||
           { echo ERR; exit 1; } &&
           echo OK
          done
      - name: Verify Dual Stack (IPv6)
        run: |
          kubectl run curl-test --image=curlimages/curl --restart=Never --command -- sleep 3600
          kubectl wait --for=condition=ready pod/curl-test --timeout=60s
          # Get Pod IPv6 Address
          POD_NAME=$(kubectl get pod -n kubeseal-webgui -l app=kubeseal-webgui -o jsonpath='{.items[0].metadata.name}')
          POD_IPV6=$(kubectl get pod "$POD_NAME" -n kubeseal-webgui -o jsonpath='{.status.podIPs[*].ip}' | tr ' ' '\n' | grep ':')
          kubectl exec curl-test -- curl -v -f -g -6 "http://[$POD_IPV6]:8080/namespaces"
          kubectl delete pod curl-test
