name: Run Python Playwright Tests
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd api
          pip install .
          pip install pytest-rerunfailures

      - name: Install Playwright Browsers
        run: |
          cd api
          playwright install --with-deps chromium
      
      - name: Start Vue.js Development Server
        run: |
          cd ui
          npm ci --legacy-peer-deps
          nohup npm run dev > dev-server.log 2>&1 &
          echo "Waiting for dev server on port 8080..."
          ready=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "Dev server failed to start within 60s. Log output:"
            cat dev-server.log || true
            exit 1
          fi

      - name: Run Playwright Tests
        run: |
          cd ui
          pytest tests/ -v --reruns 2 --reruns-delay 3

      - name: Upload dev-server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-dev-server-log
          path: ui/dev-server.log
          if-no-files-found: ignore
